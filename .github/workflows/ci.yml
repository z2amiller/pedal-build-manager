name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check out kicad-pedal-common
        uses: actions/checkout@v4
        with:
          repository: andrewmiller/kicad-pedal-common  # TODO: update org/repo
          path: kicad-pedal-common
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install -e kicad-pedal-common
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Test
        run: pytest tests/ -v
